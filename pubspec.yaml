name: tubing_calculator
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.4
  sqflite: ^2.4.2
  path: ^1.9.1
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  wakelock_plus: ^1.4.0
  vector_math: ^2.2.0
  
  # 🚀 [추가됨] OCR(글자 인식) 및 카메라 기능
  image_picker: ^1.2.1
  google_mlkit_text_recognition: ^0.15.1
  
  # 🚀 태블릿 내부 영구 저장을 위한 패키지
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  csv: ^8.0.0
  share_plus: ^12.0.1
  mobile_scanner: ^7.2.0
  pdf: ^3.12.0
  
  # 🚀 현장 뷰어 전용 (오프라인 QR 딥링크 수신용)
  app_links: ^3.5.0
  image_cropper: ^12.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # 🚀 폰트 파일 경로
  assets:
    - assets/fonts/NotoSansKR-VariableFont_wght.ttf